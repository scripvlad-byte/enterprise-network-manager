<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1>Enterprise Network Dashboard</h1>
        <p class="text-muted">Monitoring system for IT infrastructure</p>
    </div>

    <!-- Summary Cards -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-bg-primary shadow">
                <div class="card-body">
                    <h5>Total Devices</h5>
                    <h2>3</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-success shadow">
                <div class="card-body">
                    <h5>Online</h5>
                    <h2>2</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-danger shadow">
                <div class="card-body">
                    <h5>Offline</h5>
                    <h2>1</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Devices Table -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            Devices Status
        </div>

        <div class="card-body p-0">

            <table class="table table-striped mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Device</th>
                        <th>IP Address</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Router-01</td>
                        <td>192.168.1.1</td>
                        <td><span class="badge bg-success">Online</span></td>
                    </tr>

                    <tr>
                        <td>Switch-01</td>
                        <td>192.168.1.2</td>
                        <td><span class="badge bg-success">Online</span></td>
                    </tr>

                    <tr>
                        <td>Server-01</td>
                        <td>192.168.1.10</td>
                        <td><span class="badge bg-danger">Offline</span></td>
                    </tr>

                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
